databaseChangeLog:
  - changeSet:
      id: 008-populate-lesson-student-new-status
      author: art-sov
      changes:
        - sql:
            # Populate status based on existing attendance_status
            UPDATE lesson_student SET status = 'COMPLETED' WHERE attendance_status = 'PRESENT';
        - sql:
            UPDATE lesson_student SET status = 'CANCELED' WHERE attendance_status = 'ABSENT';
