databaseChangeLog:
  - changeSet:
      id: 006-create-balance-transactions
      author: art-sov
      changes:
        - createTable:
            tableName: balance_transactions
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: student_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: transaction_datetime
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: DECIMAL(19, 2)
                  constraints:
                    nullable: false
              - column:
                  name: currency
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: source_entity
                  type: VARCHAR(50)
              - column:
                  name: source_id
                  type: BIGINT
        - addForeignKeyConstraint:
            baseTableName: balance_transactions
            baseColumnNames: student_id
            referencedTableName: students
            referencedColumnNames: id
            constraintName: fk_balance_transactions_student_id
