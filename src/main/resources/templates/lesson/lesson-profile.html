<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lesson</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="profile-page">
<div class="container profile-page" style="max-width: 800px;">
    <h2>Lesson Details</h2>
    <hr/>
    <div class="card">
        <div class="card-body">
            <p class="card-text"><strong>Date:</strong> <span th:text="${lesson.lessonDate}"></span></p>

            <h5 class="card-title mt-4">Students Enrolled</h5>
            <div class="table-responsive">
                <table>
                    <thead>
                    <tr>
                        <th>Student</th>
                        <th>Status</th>
                        <th>Price</th>
                        <th>Payment Status</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="lessonStudent : ${lesson.studentAssociations}" th:id="'student-row-' + ${lessonStudent.id}">
                        <td th:text="${lessonStudent.studentFirstName + ' ' + lessonStudent.studentLastName}"></td>
                        <td>
                            <span th:text="${lessonStudent.status}" th:classappend="'status-' + ${lessonStudent.status}"></span>
                        </td>
                        <td th:text="${lessonStudent.currency.symbol + #numbers.formatDecimal(lesson.studentAssociations.size() > 1 ? lessonStudent.priceGroup : lessonStudent.priceIndividual, 1, 2)}"></td>
                        <td>Status</td>
                    </tr>
                    <tr th:if="${lesson.studentAssociations.isEmpty()}">
                        <td colspan="3" style="text-align: center;">No students enrolled.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <a th:href="@{/lessons/edit/{id}(id=${lesson.id})}" class="btn btn-primary btn-profile-action">Edit Lesson</a>
    <form th:action="@{/lessons/delete/{id}(id=${lesson.id})}" method="post" style="display:inline;">
        <button type="submit" class="btn btn-primary btn-profile-action"
                th:disabled="${!canDeleteLesson}"
                th:title="${!canDeleteLesson ? 'Cannot delete: some students statuses are not SCHEDULED.' : 'Delete Lesson'}"
                style="background: #dc3545; box-shadow: 0 4px 15px rgba(220, 53, 69, 0.6);"
                onclick="return confirm('Are you sure you want to delete this lesson?');">Delete Lesson</button>
    </form>
    <a href="/lessons/list" class="btn btn-secondary btn-profile-action">Back to Lesson List</a>
</div>
</body>
</html>
