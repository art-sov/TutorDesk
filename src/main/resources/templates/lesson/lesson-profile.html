<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lesson</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        .absent-student {
            opacity: 0.5;
            text-decoration: line-through;
        }
        /* Custom checkbox styles to match the app theme */
        .form-check-input {
            width: 1.5em;
            height: 1.5em;
            margin-top: 0;
            vertical-align: middle;
            background-color: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: .35rem;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            -webkit-print-color-adjust: exact;
            color-adjust: exact;
            display: inline-block;
            cursor: pointer;
            transition: background-color 0.15s ease-in-out, border-color 0.15s ease-in-out;
        }
        .form-check-input:checked {
            background-color: #ff7e5f;
            border-color: #ff7e5f;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20'%3e%3cpath fill='none' stroke='%23fff' stroke-linecap='round' stroke-linejoin='round' stroke-width='3' d='M6 10l3 3l6-6'/%3e%3c/svg%3e");
        }
        .form-check-input:focus {
            border-color: #ff7e5f;
            outline: 0;
            box-shadow: 0 0 8px 2px rgba(255, 126, 95, 0.6);
        }
        .form-check {
            display: flex;
            justify-content: center;
            align-items: center;
            padding-left: 0;
        }
        th, td {
            text-align: center;
        }
        th:first-child, td:first-child {
            text-align: left;
        }
    </style>
</head>
<body class="profile-page">
<div class="container profile-page" style="max-width: 800px;">
    <h2>Lesson Details</h2>
    <hr/>
    <div class="card">
        <div class="card-body">
            <h5 class="card-title">Details</h5>
            <p class="card-text"><strong>Date:</strong> <span th:text="${lesson.lessonDate}"></span></p>

            <h5 class="card-title mt-4">Students Enrolled</h5>
            <div class="table-responsive">
                <table>
                    <thead>
                    <tr>
                        <th>Student</th>
                        <th>Present</th>
                        <th>Price</th>
                        <th>Payment Status</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="lessonStudent : ${lesson.studentAssociations}" th:id="'student-row-' + ${lessonStudent.studentId}" th:classappend="${lessonStudent.attendanceStatus == T(com.art.tutordesk.lesson.AttendanceStatus).ABSENT} ? 'absent-student' : ''">
                        <td th:text="${lessonStudent.studentFirstName + ' ' + lessonStudent.studentLastName}"></td>
                        <td>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox"
                                       th:checked="${lessonStudent.attendanceStatus == T(com.art.tutordesk.lesson.AttendanceStatus).PRESENT}"
                                       th:onchange="'updateAttendance(' + ${lesson.id} + ', ' + ${lessonStudent.studentId} + ', this.checked)'">
                            </div>
                        </td>
                        <td th:id="'price-' + ${lessonStudent.studentId}" th:text="${lessonStudent.price}"></td>
                        <td>
                            <span th:id="'payment-status-' + ${lessonStudent.studentId}"
                                  th:text="${lessonStudent.paymentStatus}"
                                  th:classappend="'status-' + ${#strings.toLowerCase(lessonStudent.paymentStatus)} + ' payment-status-span'"
                                  th:style="${lessonStudent.attendanceStatus == T(com.art.tutordesk.lesson.AttendanceStatus).ABSENT ? 'display: none;' : 'display: inline;'}">
                            </span>
                        </td>
                    </tr>
                    <tr th:if="${lesson.studentAssociations.isEmpty()}">
                        <td colspan="4" style="text-align: center;">No students enrolled.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <a th:href="@{/lessons/edit/{id}(id=${lesson.id})}" class="btn btn-primary btn-profile-action">Edit Lesson</a>
    <form th:action="@{/lessons/delete/{id}(id=${lesson.id})}" method="post" style="display:inline;">
        <button type="submit" class="btn btn-primary btn-profile-action" style="background: #dc3545; box-shadow: 0 4px 15px rgba(220, 53, 69, 0.6);"
                onclick="return confirm('Are you sure you want to delete this lesson?');">Delete Lesson</button>
    </form>
    <a href="/lessons/list" class="btn btn-secondary btn-profile-action">Back to Lesson List</a>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    const csrfToken = document.querySelector("meta[name='_csrf']").getAttribute("content");
    const csrfHeader = document.querySelector("meta[name='_csrf_header']").getAttribute("content");

    function updateAttendance(lessonId, studentId, isChecked) {
        const status = isChecked ? 'PRESENT' : 'ABSENT';

        const headers = {
            'Content-Type': 'application/json'
        };
        headers[csrfHeader] = csrfToken;

        fetch(`/lessons/${lessonId}/students/${studentId}/attendance`, {
            method: 'POST',
            headers: headers,
            body: JSON.stringify({ status: status })
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('Failed to update attendance');
            }
            return response.json();
        })
        .then(data => {
            document.getElementById('price-' + studentId).innerText = parseFloat(data.newPrice).toFixed(2);

            const row = document.getElementById('student-row-' + studentId);
            if (status === 'ABSENT') {
                row.classList.add('absent-student');
            } else {
                row.classList.remove('absent-student');
            }

            const paymentStatusSpan = document.getElementById('payment-status-' + studentId);
            if (paymentStatusSpan) {
                // Update status text and class
                paymentStatusSpan.innerText = data.newPaymentStatus;
                paymentStatusSpan.className = 'payment-status-span'; // Reset classes
                paymentStatusSpan.classList.add('status-' + data.newPaymentStatus.toLowerCase());

                // Update visibility
                if (status === 'ABSENT') {
                    paymentStatusSpan.style.display = 'none';
                } else {
                    paymentStatusSpan.style.display = 'inline';
                }
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('Could not update attendance. Please try again.');
            window.location.reload();
        });
    }
    /*]]>*/
</script>

</body>
</html>
